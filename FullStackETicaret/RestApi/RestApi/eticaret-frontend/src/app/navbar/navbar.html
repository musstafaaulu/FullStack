<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-2">
  <div class="container">
    <div class="d-flex align-items-center">
      <a class="navbar-brand fw-bold fs-3 me-4" routerLink="/home" style="letter-spacing: -1px;">
        NEXUS <span class="text-primary" style="color: #0d6efd !important;">CORE</span>
      </a>
      <a class="btn btn-outline-light btn-sm rounded-pill px-3 d-none d-md-inline-block" routerLink="/home">
        <i class="bi bi-house-door me-1"></i> Ana Sayfa
      </a>
    </div>

    <div class="ms-auto d-flex align-items-center gap-2">
      <a routerLink="/cart" class="btn btn-primary btn-sm position-relative rounded-pill px-4 py-2 me-2">
        <i class="bi bi-cart3 fs-6 me-1"></i> 
        <span class="d-none d-sm-inline">Sepetim</span>
        <span *ngIf="cartCount > 0" 
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-2 border-dark">
          {{cartCount}}
        </span>
      </a>

      <a *ngIf="!currentUser" routerLink="/login" class="btn btn-outline-info btn-sm px-3 rounded-pill text-white">
        Giriş Yap
      </a>

      <ng-container *ngIf="currentUser">
        
        <a *ngIf="currentUser.role?.includes('Admin')" 
           routerLink="/admin" 
           class="btn btn-warning btn-sm fw-bold px-3 rounded-pill text-dark shadow-sm me-2">
          <i class="bi bi-speedometer2 me-1"></i> Admin Paneli
        </a>

        <div class="dropdown d-inline-block">
          <button class="btn btn-outline-light btn-sm rounded-pill dropdown-toggle d-flex align-items-center gap-2 px-3" 
                  type="button" 
                  (click)="toggleDropdown()">
            <i class="bi bi-person-circle fs-5"></i>
            <span class="d-none d-lg-inline fw-semibold">{{ currentUser.name?.split(' ')[0] }}</span>
          </button>
          
          <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-2 rounded-3" 
              [class.show]="dropdownOpen" 
              style="position: absolute; right: 0;">
            <li><h6 class="dropdown-header text-muted">Hesap Yönetimi</h6></li>
            <li>
              <a class="dropdown-item py-2" routerLink="/profile" (click)="dropdownOpen = false">
                <i class="bi bi-person me-2 text-primary"></i> Profilim
              </a>
            </li>
            <li>
              <a class="dropdown-item py-2" routerLink="/profile" [queryParams]="{tab: 'orders'}" (click)="dropdownOpen = false">
                <i class="bi bi-box-seam me-2 text-success"></i> Siparişlerim
              </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <button class="dropdown-item py-2 text-danger fw-bold" (click)="logout()">
                <i class="bi bi-box-arrow-right me-2"></i> Çıkış Yap
              </button>
            </li>
          </ul>
        </div>

      </ng-container>
    </div>
  </div>
</nav>
