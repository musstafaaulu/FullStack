<!-- src/app/register/register.html -->

<div class="register-container">
  <div class="register-box">
    <h2>Hesap Oluştur</h2>

    <div class="alert error" *ngIf="errorMsg">{{ errorMsg }}</div>
    <div class="alert success" *ngIf="successMsg">{{ successMsg }}</div>

    <form (ngSubmit)="onRegister()">
      <div class="form-group">
        <label>Ad Soyad</label>
        <input type="text" [(ngModel)]="fullName" name="fullName" required placeholder="Ad Soyad" />
      </div>

      <div class="form-group">
        <label>E-posta</label>
        <input type="email" [(ngModel)]="email" name="email" required placeholder="E-posta" />
      </div>

      <div class="form-group">
        <label>Şifre</label>
        <input type="password" [(ngModel)]="password" name="password" required placeholder="Şifre" />
      </div>

      <div class="form-group">
        <label>Şifre Tekrar</label>
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required placeholder="Şifre Tekrar" />
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Kaydediliyor...' : 'Kayıt Ol' }}
      </button>
    </form>

    <p class="login-link">Zaten hesabın var mı? <a routerLink="/login">Giriş Yap</a></p>
  </div>
</div>
